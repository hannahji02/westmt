<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEST HOCKEY · 팀 룰렛</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Archivo+Black&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    /* 파스텔 팔레트 */
    --coral: #F4A89A;
    --coral-soft: #FBD7CF;
    --coral-deep: #E88A78;
    --mint: #5FB8A8;
    --mint-soft: #C8E8E0;
    --mint-deep: #4A9C8C;
    --blue: #7DA3D9;
    --blue-soft: #CFDDF0;
    --blue-deep: #4A7BC8;
    /* 콜드 그레이 (모던 베이스) */
    --bg-base: #F0F2F5;
    --bg-soft: #F7F8FA;
    --grey-line: #E2E5EB;
    --grey-mid: #C5CAD2;
    --grey-deep: #8A92A0;
    /* 잉크 */
    --ink: #2A2F38;
    --ink-soft: #5B6478;
    --ink-faint: #8A92A4;
    --black: #1A1F28;
    /* 카드 */
    --card: rgba(255, 255, 255, 0.85);
    --card-solid: #FFFFFF;
    /* 팀 컬러 */
    --team-a: var(--blue-deep);
    --team-b: var(--mint-deep);
    --team-c: var(--coral-deep);
    --team-d: #E8B800;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg-base);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ===== 배경 데코 (파스텔 닷 + 하키 기어) ===== */
  .bg-deco {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    overflow: hidden;
  }
  .bg-deco-item {
    position: absolute;
    opacity: 0.55;
    animation: floatGentle 8s ease-in-out infinite;
  }
  .bg-deco-item.dot {
    border-radius: 50%;
  }
  @keyframes floatGentle {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(6px, -10px); }
  }

  /* ===== HEADER ===== */
  .header {
    padding: 24px 28px 0;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  .logo {
    height: 38px;
    width: auto;
    opacity: 0.85;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
    position: relative;
  }

  /* ===== HERO (GO WEST 텍스트) ===== */
  .hero {
    padding: 20px 0 32px;
    text-align: center;
  }
  .hero-eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: var(--blue-deep);
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .hero-title {
    font-family: 'Archivo Black', 'Inter', sans-serif;
    font-size: clamp(48px, 9vw, 96px);
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -0.04em;
    color: var(--ink);
    margin: 0;
  }
  .hero-title .go-quote {
    color: var(--ink);
  }
  .hero-title .west {
    color: var(--blue-deep);
  }
  .hero-title .ice {
    color: var(--ink);
  }
  .hero-title .hockey {
    color: var(--mint-deep);
  }
  .hero-title .team {
    color: var(--coral-deep);
  }
  .hero-sub {
    margin-top: 18px;
    color: var(--ink-soft);
    font-size: 15px;
    letter-spacing: -0.01em;
  }

  /* ===== PANEL ===== */
  .panel {
    background: var(--card);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--grey-line);
    border-radius: 22px;
    padding: 28px;
    margin-bottom: 24px;
    position: relative;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .panel-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-count {
    color: var(--blue-deep);
    font-variant-numeric: tabular-nums;
    font-weight: 800;
  }
  .panel-actions { display: flex; gap: 8px; }
  .btn-mini {
    border: 1.5px solid var(--grey-line);
    background: transparent;
    color: var(--ink-soft);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-mini:hover {
    border-color: var(--blue-deep);
    color: var(--blue-deep);
    background: var(--blue-soft);
  }

  /* ===== MEMBER CHIPS ===== */
  .members-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
  }
  .member-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border: 1.5px solid var(--grey-line);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
    background: rgba(255, 255, 255, 0.7);
    position: relative;
  }
  .member-chip:hover {
    border-color: var(--blue);
    background: rgba(255, 255, 255, 0.95);
    transform: translateY(-1px);
  }
  .member-chip.checked {
    border-color: var(--blue);
    background: rgba(125, 163, 217, 0.18);
  }

  /* 체크박스 — 플랫 반투명 */
  .check-box {
    width: 20px; height: 20px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.6);
    border: 1.5px solid var(--grey-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
  }
  .member-chip.checked .check-box {
    background: var(--mint);
    border-color: var(--mint);
  }

  .check-icon {
    width: 14px; height: 14px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .member-chip.checked .check-icon { opacity: 1; }
  .member-name {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  /* 결과 카드 멤버 컬러 닷 */
  .member-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    opacity: 0.75;
  }


  /* ===== CTA — 퍽 드롭! ===== */
  .cta-wrap {
    display: flex;
    justify-content: center;
    margin: 36px 0 32px;
    position: relative;
  }
  .btn-spin {
    background: linear-gradient(180deg, #2A2F38 0%, #1A1F28 100%);
    color: #fff;
    border: none;
    padding: 22px 56px;
    border-radius: 999px;
    font-family: 'Inter', 'Noto Sans KR', sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(.4,1.6,.6,1);
    box-shadow:
      0 8px 24px rgba(26, 31, 40, 0.28),
      inset 0 2px 0 rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .btn-spin::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    transition: left 0.6s;
  }
  .btn-spin:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow:
      0 12px 32px rgba(74, 123, 200, 0.35),
      inset 0 2px 0 rgba(255, 255, 255, 0.15);
  }
  .btn-spin:hover:not(:disabled)::after { left: 120%; }
  .btn-spin:active:not(:disabled) { transform: translateY(0); }
  .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ===== RESULT STATUS ===== */
  .result-status {
    text-align: center;
    color: var(--ink-soft);
    font-size: 14px;
    margin-bottom: 20px;
    min-height: 20px;
    letter-spacing: -0.01em;
  }
  .result-status strong {
    color: var(--blue-deep);
    font-weight: 700;
  }
  .captain-hint {
    text-align: center;
    color: var(--ink-faint);
    font-size: 12px;
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }
  .captain-hint .crown-mini {
    display: inline-block;
    width: 12px;
    height: 12px;
    vertical-align: -2px;
    margin: 0 2px;
    color: var(--coral-deep);
  }

  /* ===== TEAM CARDS ===== */
  .teams-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
  }
  .team-card {
    background: var(--card);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1.5px solid var(--grey-line);
    border-radius: 20px;
    padding: 22px 20px;
    min-height: 240px;
    opacity: 0;
    transform: translateY(20px) scale(0.96);
    transition: opacity 0.5s ease, transform 0.55s cubic-bezier(.2,1.4,.4,1);
    position: relative;
    overflow: hidden;
  }
  .team-card > * { position: relative; z-index: 1; }
  .team-card.show { opacity: 1; transform: translateY(0) scale(1); }

  /* 팀별 강조 보더 */
  .team-card.team-a { border-color: rgba(74, 123, 200, 0.35); }
  .team-card.team-b { border-color: rgba(74, 156, 140, 0.35); }
  .team-card.team-c { border-color: rgba(232, 138, 120, 0.35); }
  .team-card.team-d { border-color: rgba(232, 184, 0, 0.35); }

  /* 팀장 지정 시 카드 강조 */
  .team-card.has-captain {
    box-shadow: 0 8px 24px rgba(232, 138, 120, 0.18);
  }

  .team-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px dashed var(--grey-line);
    gap: 10px;
  }
  .team-name-group {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }
  .team-badge {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Archivo Black', 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 900;
    color: #fff;
    flex-shrink: 0;
  }
  .team-a .team-badge { background: var(--team-a); }
  .team-b .team-badge { background: var(--team-b); }
  .team-c .team-badge { background: var(--team-c); }
  .team-d .team-badge { background: var(--team-d); }

  .team-name {
    font-family: 'Inter', 'Noto Sans KR', sans-serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    flex: 1;
  }
  .team-a .team-name { color: var(--team-a); }
  .team-b .team-name { color: var(--team-b); }
  .team-c .team-name { color: var(--team-c); }
  .team-d .team-name { color: var(--team-d); }

  /* 팀장 모드: 팀 이름 색상 — 코랄 강조 */
  .team-card.has-captain .team-name {
    color: var(--coral-deep);
  }

  .team-size {
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-soft);
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid var(--grey-line);
    padding: 4px 10px;
    border-radius: 999px;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  .team-members {
    list-style: none;
    margin: 0; padding: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .team-member {
    padding: 10px 12px;
    background: rgba(247, 248, 250, 0.7);
    border: 1px solid rgba(226, 229, 235, 0.6);
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transform: translateX(-8px);
    animation: slideIn 0.35s ease forwards;
    position: relative;
    transition: background 0.2s, border-color 0.2s;
  }
  @keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
  }
  .team-member.is-seed {
    background: rgba(232, 235, 240, 0.7);
    border-color: var(--grey-mid);
    color: var(--black);
  }
  /* 팀장 멤버 강조 */
  .team-member.is-captain {
    background: rgba(232, 138, 120, 0.12);
    border-color: var(--coral-deep);
    font-weight: 700;
  }

  /* 팀장 체크포인트 (동그라미) */
  .captain-toggle {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--grey-mid);
    background: rgba(255, 255, 255, 0.7);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
    padding: 0;
    margin-right: 2px;
  }
  .captain-toggle:hover {
    border-color: var(--coral-deep);
    background: var(--coral-soft);
    transform: scale(1.08);
  }
  .captain-toggle .crown-icon {
    width: 12px;
    height: 12px;
    opacity: 0;
    transition: opacity 0.18s;
    color: #fff;
  }
  .team-member.is-captain .captain-toggle {
    background: var(--coral-deep);
    border-color: var(--coral-deep);
  }
  .team-member.is-captain .captain-toggle .crown-icon {
    opacity: 1;
  }

  .member-name-text {
    flex: 1;
    min-width: 0;
  }

  /* ===== SHUFFLE OVERLAY ===== */
  .shuffle-overlay {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at center, #F7F8FA 0%, #E2E5EB 100%);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
    z-index: 100;
    overflow: hidden;
  }
  .shuffle-overlay::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid var(--grey-line);
    border-radius: 50%;
    pointer-events: none;
  }
  .shuffle-overlay::after {
    content: '';
    position: absolute;
    width: 380px; height: 380px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid var(--grey-line);
    border-radius: 50%;
    pointer-events: none;
  }
  .shuffle-overlay.show { display: flex; }

  .puck-stage {
    position: relative;
    width: 220px;
    height: 220px;
    z-index: 2;
  }
  .puck {
    position: absolute;
    inset: 0;
    margin: auto;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: linear-gradient(180deg, #2A2F38 0%, #1A1F28 100%);
    box-shadow:
      0 12px 30px rgba(26, 31, 40, 0.3),
      inset 0 -6px 12px rgba(0,0,0,0.3),
      inset 0 2px 6px rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: puckSpin 1.2s cubic-bezier(.2,.6,.3,1) forwards;
  }
  @keyframes puckSpin {
    0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: rotate(900deg) scale(1); opacity: 1; }
  }

  .shuffle-text {
    font-family: 'Archivo Black', 'Inter', sans-serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 0.02em;
    color: var(--ink);
    z-index: 2;
  }
  .shuffle-text em {
    font-style: normal;
    color: var(--coral-deep);
  }
  .shuffle-names {
    font-size: 14px;
    color: var(--ink-soft);
    height: 20px;
    font-variant-numeric: tabular-nums;
    z-index: 2;
    font-weight: 500;
  }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
  }
  .empty-state-icon {
    width: 70px;
    height: 70px;
    margin: 0 auto 16px;
    opacity: 0.5;
  }
  .empty-state-text {
    font-size: 14px;
    font-weight: 500;
  }

  /* ===== RE-ROLL ===== */
  .reroll-wrap {
    display: flex;
    justify-content: center;
    margin-top: 32px;
  }
  .btn-reroll {
    border: 1.5px solid var(--grey-line);
    background: rgba(255, 255, 255, 0.8);
    color: var(--ink);
    padding: 12px 28px;
    border-radius: 999px;
    font-family: 'Inter', 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-reroll:hover {
    border-color: var(--coral-deep);
    color: var(--coral-deep);
    transform: translateY(-1px);
  }
  .btn-reroll svg {
    width: 14px; height: 14px;
    stroke: currentColor;
    stroke-width: 2.5;
    fill: none;
  }

  /* ===== CONFETTI ===== */
  .confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    .header { padding: 16px 18px 0; }
    .logo { height: 30px; }
    .container { padding: 0 16px 60px; }
    .hero { padding: 12px 0 24px; }
    .hero-eyebrow { font-size: 10px; margin-bottom: 10px; }
    .hero-sub { font-size: 13px; margin-top: 14px; }
    .panel { padding: 20px; border-radius: 18px; }
    .panel-title { font-size: 14px; }
    .members-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .member-chip { padding: 10px 12px; }
    .member-name { font-size: 13px; }
    .teams-grid { grid-template-columns: 1fr; }
    .team-badge { width: 28px; height: 28px; font-size: 14px; }
    .team-name { font-size: 17px; }
    .btn-spin { padding: 18px 42px; font-size: 17px; }
    .puck-stage { width: 180px; height: 180px; }
    .puck { width: 130px; height: 130px; }
    .shuffle-text { font-size: 24px; }
    .shuffle-overlay::before { width: 420px; height: 420px; }
    .shuffle-overlay::after { width: 260px; height: 260px; }
  }
</style>
</head>
<body>

<!-- ===== 배경 데코 ===== -->
<div class="bg-deco" id="bgDeco"></div>

<!-- ===== SVG DEFS ===== -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="ic-puck-empty" viewBox="0 0 80 80">
      <ellipse cx="40" cy="45" rx="32" ry="10" fill="var(--blue-soft)" opacity="0.5"/>
      <ellipse cx="40" cy="40" rx="32" ry="12" fill="var(--blue-deep)" opacity="0.6"/>
    </symbol>

    <symbol id="deco-puck" viewBox="0 0 60 60">
      <ellipse cx="30" cy="38" rx="24" ry="6" fill="#1A1F28" opacity="0.85"/>
      <ellipse cx="30" cy="34" rx="24" ry="10" fill="#2A2F38"/>
      <ellipse cx="30" cy="32" rx="22" ry="6" fill="#3A3F48" opacity="0.6"/>
      <ellipse cx="24" cy="30" rx="6" ry="2" fill="#5A5F68" opacity="0.4"/>
    </symbol>

    <symbol id="deco-stick" viewBox="0 0 80 80">
      <line x1="10" y1="14" x2="62" y2="66" stroke="#5B6478" stroke-width="5" stroke-linecap="round"/>
      <line x1="12" y1="16" x2="60" y2="64" stroke="#8A92A0" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 58 66 L 74 66 L 74 74 L 58 74 Z" fill="#5B6478"/>
      <line x1="61" y1="69" x2="71" y2="69" stroke="#C5CAD2" stroke-width="0.8" opacity="0.6"/>
    </symbol>

    <!-- 왕관 아이콘 (팀장 표시) -->
    <symbol id="ic-crown" viewBox="0 0 24 24">
      <path d="M 3 8 L 6 14 L 9 6 L 12 12 L 15 6 L 18 14 L 21 8 L 20 18 L 4 18 Z"
            fill="currentColor" stroke="currentColor" stroke-width="0.5" stroke-linejoin="round"/>
    </symbol>
  </defs>
</svg>

<header class="header">
  <img src="logo.png" alt="WEST HOCKEY" class="logo" onerror="this.style.display='none'">
</header>

<div class="container">

  <section class="hero">
    <div class="hero-eyebrow">WEST HOCKEY · MT TEAM ROULETTE</div>
    <h1 class="hero-title">
      <span class="go-quote">GO</span> <span class="west">WEST!</span><br>
      <span class="ice">ICE</span> <span class="hockey">HOCKEY</span> <span class="team">TEAM</span>
    </h1>
    <p class="hero-sub">MT 조 편성 룰렛</p>
  </section>

  <section class="panel">
    <div class="panel-header">
      <h2 class="panel-title">참가 멤버 · <span class="panel-count" id="count">0</span>명 선택됨</h2>
      <div class="panel-actions">
        <button class="btn-mini" id="selectAll">전체 선택</button>
        <button class="btn-mini" id="deselectAll">전체 해제</button>
      </div>
    </div>
    <div class="members-grid" id="membersGrid"></div>
  </section>

  <div class="cta-wrap">
    <button class="btn-spin" id="spinBtn">
      <span>퍽 드롭!</span>
    </button>
  </div>

  <div class="result-status" id="resultStatus"></div>
  <div class="captain-hint" id="captainHint" style="display:none;">
    각 팀원 옆 <svg class="crown-mini"><use href="#ic-crown"/></svg> 버튼을 눌러 팀장을 지정하세요 (다시 누르면 해제)
  </div>

  <section id="resultSection">
    <div class="empty-state" id="emptyState">
      <svg class="empty-state-icon"><use href="#ic-puck-empty"/></svg>
      <div class="empty-state-text">위 버튼을 눌러 팀을 편성해주세요</div>
    </div>
    <div class="teams-grid" id="teamsGrid" style="display:none;"></div>
    <div class="reroll-wrap" id="rerollWrap" style="display:none;">
      <button class="btn-reroll" id="rerollBtn">
        <svg viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        <span>다시 돌리기</span>
      </button>
    </div>
  </section>

</div>

<div class="shuffle-overlay" id="shuffleOverlay">
  <div class="puck-stage">
    <div class="puck"></div>
  </div>
  <div class="shuffle-text">DROP THE <em>PUCK!</em></div>
  <div class="shuffle-names" id="shuffleNames">&nbsp;</div>
</div>

<canvas class="confetti-canvas" id="confettiCanvas"></canvas>

<script>
  // ===== 배경 데코 생성 =====
  (function setupBgDeco() {
    const deco = document.getElementById('bgDeco');
    const colors = ['#FBD7CF', '#C8E8E0', '#CFDDF0', '#F4A89A', '#5FB8A8', '#7DA3D9'];
    for (let i = 0; i < 18; i++) {
      const dot = document.createElement('div');
      dot.className = 'bg-deco-item dot';
      const size = 8 + Math.random() * 60;
      dot.style.width = dot.style.height = size + 'px';
      dot.style.background = colors[Math.floor(Math.random() * colors.length)];
      dot.style.top = (Math.random() * 100) + '%';
      dot.style.left = (Math.random() * 100) + '%';
      dot.style.opacity = (0.25 + Math.random() * 0.35).toFixed(2);
      dot.style.animationDelay = (Math.random() * 4) + 's';
      dot.style.animationDuration = (6 + Math.random() * 6) + 's';
      deco.appendChild(dot);
    }
    for (let i = 0; i < 4; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'bg-deco-item';
      const size = 32 + Math.random() * 26;
      wrap.style.width = wrap.style.height = size + 'px';
      wrap.style.top = (8 + Math.random() * 80) + '%';
      wrap.style.left = (Math.random() * 92) + '%';
      wrap.style.opacity = (0.18 + Math.random() * 0.15).toFixed(2);
      wrap.style.animationDelay = (Math.random() * 4) + 's';
      wrap.style.animationDuration = (7 + Math.random() * 5) + 's';
      wrap.style.transform = `rotate(${Math.random()*30 - 15}deg)`;
      wrap.innerHTML = `<svg width="100%" height="100%"><use href="#deco-puck"/></svg>`;
      deco.appendChild(wrap);
    }
    for (let i = 0; i < 3; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'bg-deco-item';
      const size = 48 + Math.random() * 36;
      wrap.style.width = wrap.style.height = size + 'px';
      wrap.style.top = (Math.random() * 90) + '%';
      wrap.style.left = (Math.random() * 90) + '%';
      wrap.style.opacity = (0.18 + Math.random() * 0.15).toFixed(2);
      wrap.style.animationDelay = (Math.random() * 4) + 's';
      wrap.style.animationDuration = (8 + Math.random() * 4) + 's';
      wrap.style.transform = `rotate(${Math.random()*120 - 60}deg)`;
      wrap.innerHTML = `<svg width="100%" height="100%"><use href="#deco-stick"/></svg>`;
      deco.appendChild(wrap);
    }
  })();

  // ===== 멤버 데이터 =====
  const SEED_MEMBERS = ['김세형', '장병주', '최정학', '지혜은'];
  const REGULAR_MEMBERS = [
    '강다연', '강소현', '김동현', '김석현', '김예은',
    '문인화', '안지용', '유광현', '이다연', '이지훈',
    '이태경', '조우제', '최준성', '박민채', '김가연'
  ];
  const ALL_MEMBERS = [...SEED_MEMBERS, ...REGULAR_MEMBERS];

  const GENDER = {
    '김동현':'M', '김석현':'M', '김세형':'M', '안지용':'M', '유광현':'M',
    '이지훈':'M', '이태경':'M', '장병주':'M', '조우제':'M', '최정학':'M',
    '최준성':'M', '박민채':'M',
    '강다연':'F', '강소현':'F', '김예은':'F', '문인화':'F',
    '이다연':'F', '지혜은':'F', '김가연':'F'
  };

  const TEAM_DATA = [
    { label: 'A' },
    { label: 'B' },
    { label: 'C' },
    { label: 'D' }
  ];

  // ===== State =====
  const checkedState = new Map();
  ALL_MEMBERS.forEach(name => checkedState.set(name, true));

  // 팀장 상태 — key: 팀 인덱스(0~3), value: 멤버 이름. 미지정 시 해당 키 없음
  let captainsState = {};
  // 현재 렌더된 팀 결과 보관 (팀장 토글 시 재렌더용)
  let currentTeams = null;
  let currentTotal = 0;

  const grid = document.getElementById('membersGrid');
  const countEl = document.getElementById('count');
  const spinBtn = document.getElementById('spinBtn');
  const resultStatus = document.getElementById('resultStatus');
  const captainHint = document.getElementById('captainHint');
  const teamsGrid = document.getElementById('teamsGrid');
  const emptyState = document.getElementById('emptyState');
  const shuffleOverlay = document.getElementById('shuffleOverlay');
  const shuffleNames = document.getElementById('shuffleNames');
  const rerollWrap = document.getElementById('rerollWrap');
  const rerollBtn = document.getElementById('rerollBtn');

  function renderMembers() {
    grid.innerHTML = '';
    const seedSorted = [...SEED_MEMBERS].sort((a,b) => a.localeCompare(b, 'ko'));
    const regSorted = [...REGULAR_MEMBERS].sort((a,b) => a.localeCompare(b, 'ko'));
    const ordered = [...seedSorted, ...regSorted];

ordered.forEach(name => {
      const checked = checkedState.get(name);
      const chip = document.createElement('div');
      chip.className = 'member-chip' + (checked ? ' checked' : '');
      chip.innerHTML = `
        <div class="check-box">
          <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="5 12 10 17 19 7"/>
          </svg>
        </div>
        <span class="member-name">${name}</span>
      `;
      chip.addEventListener('click', () => {
        checkedState.set(name, !checkedState.get(name));
        renderMembers();
        updateCount();
      });
      grid.appendChild(chip);
    });
  }

  function updateCount() {
    const n = [...checkedState.values()].filter(Boolean).length;
    countEl.textContent = n;
  }

  document.getElementById('selectAll').addEventListener('click', () => {
    ALL_MEMBERS.forEach(n => checkedState.set(n, true));
    renderMembers(); updateCount();
  });
  document.getElementById('deselectAll').addEventListener('click', () => {
    ALL_MEMBERS.forEach(n => checkedState.set(n, false));
    renderMembers(); updateCount();
  });

  renderMembers();
  updateCount();

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const SPREAD_GROUPS = [
    ['이지훈', '박민채', '김세형'],
    ['최정학', '지혜은']
  ];

  const EXCLUSION_PAIRS = [
    ['박민채', '김가연'],
    ['지혜은', '조우제'],
    ['지혜은', '김석현'],
    ['안지용', '김동현']
  ];

  function canPlaceInTeam(name, team) {
    return !team.some(m => EXCLUSION_PAIRS.some(([a, b]) =>
      (a === name && b === m.name) || (b === name && a === m.name)
    ));
  }

  function buildTeams() {
    const selectedAll = ALL_MEMBERS.filter(n => checkedState.get(n));
    const total = selectedAll.length;

    if (total < 4) {
      return { error: '최소 4명 이상 선택해야 합니다.' };
    }

    const teamCount = 4;
    let result = null;
    for (let attempt = 0; attempt < 200; attempt++) {
      result = tryBuild(selectedAll, total, teamCount);
      if (result) break;
    }

    if (!result) {
      return { error: '제약 조건을 만족하는 팀 편성이 불가능합니다.' };
    }

    const teamOrder = shuffle([0,1,2,3]);
    const ordered = teamOrder.map(i => result[i]);

    return {
      teams: ordered.map((t, i) => ({
        ...TEAM_DATA[i],
        members: shuffle(t),
        size: t.length
      })),
      total
    };
  }

  function tryBuild(selectedAll, total, teamCount) {
    const teams = Array.from({length: teamCount}, () => []);

    const base = Math.floor(total / teamCount);
    const remainder = total % teamCount;
    const bigTeams = shuffle([0,1,2,3]).slice(0, remainder);
    const targetSizes = Array.from({length: teamCount}, (_, i) =>
      bigTeams.includes(i) ? base + 1 : base
    );
    const remainingSlots = [...targetSizes];

    const placedInGroup = new Map();
    SPREAD_GROUPS.forEach((g, gi) => placedInGroup.set(gi, new Set()));

    const allSpreadMembers = [];
    SPREAD_GROUPS.forEach((g, gi) => {
      g.filter(n => selectedAll.includes(n)).forEach(name => {
        allSpreadMembers.push({ name, groupIdx: gi });
      });
    });
    const shuffledSpread = shuffle(allSpreadMembers);

    for (const { name, groupIdx } of shuffledSpread) {
      const usedTeams = placedInGroup.get(groupIdx);
      const candidates = [0,1,2,3].filter(i =>
        remainingSlots[i] > 0 &&
        !usedTeams.has(i) &&
        canPlaceInTeam(name, teams[i])
      );
      if (candidates.length === 0) return null;
      candidates.sort((a, b) => {
        if (remainingSlots[b] !== remainingSlots[a]) return remainingSlots[b] - remainingSlots[a];
        return Math.random() - 0.5;
      });
      const target = candidates[0];
      teams[target].push({ name });
      remainingSlots[target]--;
      usedTeams.add(target);
    }

    const placedNames = new Set(shuffledSpread.map(s => s.name));
    const otherMembers = selectedAll.filter(n => !placedNames.has(n));

    const F = shuffle(otherMembers.filter(n => GENDER[n] === 'F'));
    const M = shuffle(otherMembers.filter(n => GENDER[n] === 'M'));

    function placeWithConstraint(name) {
      const candidates = [0,1,2,3].filter(i =>
        remainingSlots[i] > 0 && canPlaceInTeam(name, teams[i])
      );
      if (candidates.length === 0) return false;
      candidates.sort((a, b) => {
        if (remainingSlots[b] !== remainingSlots[a]) return remainingSlots[b] - remainingSlots[a];
        return Math.random() - 0.5;
      });
      const target = candidates[0];
      teams[target].push({ name });
      remainingSlots[target]--;
      return true;
    }

    const constrainedNames = new Set();
    EXCLUSION_PAIRS.forEach(([a, b]) => { constrainedNames.add(a); constrainedNames.add(b); });

    const constrainedF = F.filter(n => constrainedNames.has(n));
    const constrainedM = M.filter(n => constrainedNames.has(n));
    const freeF = F.filter(n => !constrainedNames.has(n));
    const freeM = M.filter(n => !constrainedNames.has(n));

    for (const n of shuffle([...constrainedF, ...constrainedM])) {
      if (!placeWithConstraint(n)) return null;
    }
    for (const n of freeF) {
      if (!placeWithConstraint(n)) return null;
    }
    for (const n of freeM) {
      if (!placeWithConstraint(n)) return null;
    }

    return teams;
  }

  function startShuffleAnimation(durationMs, onComplete) {
    const puckEl = shuffleOverlay.querySelector('.puck');
    if (puckEl) {
      puckEl.style.animation = 'none';
      void puckEl.offsetWidth;
      puckEl.style.animation = '';
    }

    shuffleOverlay.classList.add('show');

    const checkedNames = ALL_MEMBERS.filter(n => checkedState.get(n));
    const interval = setInterval(() => {
      const samples = shuffle(checkedNames).slice(0, 3).join(' · ');
      shuffleNames.textContent = samples || '\u00A0';
    }, 70);

    setTimeout(() => {
      clearInterval(interval);
      shuffleOverlay.classList.remove('show');
      onComplete();
    }, durationMs);
  }

  // 팀장 토글 — 같은 멤버 다시 누르면 해제, 다른 멤버 누르면 팀장 이동
  function toggleCaptain(teamIdx, memberName) {
    if (captainsState[teamIdx] === memberName) {
      delete captainsState[teamIdx];
    } else {
      captainsState[teamIdx] = memberName;
    }
    renderTeamsOnly();
  }

  // 팀 카드만 재렌더 (입장 애니메이션 없이)
  function renderTeamsOnly() {
    if (!currentTeams) return;
    teamsGrid.innerHTML = '';
    currentTeams.forEach((team, idx) => {
      const card = buildTeamCard(team, idx, /*animate=*/false);
      teamsGrid.appendChild(card);
    });
  }

  function buildTeamCard(team, idx, animate) {
    const card = document.createElement('div');
    const captainName = captainsState[idx];
    const hasCaptain = !!captainName;
    card.className = `team-card team-${team.label.toLowerCase()}` + (hasCaptain ? ' has-captain' : '');

    const membersHtml = team.members.map((m, i) => {
      const isCaptain = m.name === captainName;
      const delay = animate ? `${i * 70}ms` : '0ms';
      const animStyle = animate
        ? `animation-delay:${delay}`
        : `animation:none; opacity:1; transform:none`;
      return `
        <li class="team-member${isCaptain ? ' is-captain' : ''}" style="${animStyle}" data-team-idx="${idx}" data-member-name="${m.name}">
          <button class="captain-toggle" aria-label="팀장 지정/해제">
            <svg class="crown-icon"><use href="#ic-crown"/></svg>
          </button>
          <span class="member-name-text">${m.name}</span>
        </li>
      `;
    }).join('');

    // 팀명: 팀장 있으면 "팀 {이름}", 없으면 "TEAM {label}"
    const teamTitle = hasCaptain ? `팀 ${captainName}` : `TEAM ${team.label}`;

    card.innerHTML = `
      <div class="team-card-header">
        <div class="team-name-group">
          <div class="team-badge">${team.label}</div>
          <div class="team-name" title="${teamTitle}">${teamTitle}</div>
        </div>
        <div class="team-size">${team.size}명</div>
      </div>
      <ul class="team-members">${membersHtml}</ul>
    `;

    // 체크포인트 클릭 이벤트
    card.querySelectorAll('.team-member').forEach(li => {
      const toggleBtn = li.querySelector('.captain-toggle');
      toggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const tIdx = parseInt(li.dataset.teamIdx, 10);
        const mName = li.dataset.memberName;
        toggleCaptain(tIdx, mName);
      });
    });

    if (animate) {
      // 입장 애니메이션
      setTimeout(() => card.classList.add('show'), idx * 100);
    } else {
      card.classList.add('show');
    }
    return card;
  }

  function renderResult(result) {
    if (result.error) {
      resultStatus.textContent = result.error;
      captainHint.style.display = 'none';
      emptyState.style.display = 'block';
      teamsGrid.style.display = 'none';
      rerollWrap.style.display = 'none';
      return;
    }
    const { teams, total } = result;
    currentTeams = teams;
    currentTotal = total;

    const sizesStr = teams.map(t => t.size).join(' / ');
    resultStatus.innerHTML = `총 <strong>${total}명</strong> · 조별 인원 <strong>${sizesStr}</strong>`;
    captainHint.style.display = 'block';

    emptyState.style.display = 'none';
    teamsGrid.style.display = 'grid';
    rerollWrap.style.display = 'flex';
    teamsGrid.innerHTML = '';

    teams.forEach((team, idx) => {
      const card = buildTeamCard(team, idx, /*animate=*/true);
      teamsGrid.appendChild(card);
    });

    setTimeout(() => launchConfetti(), 200);
  }

  function runRoulette() {
    const result = buildTeams();
    if (result.error) {
      resultStatus.textContent = result.error;
      return;
    }
    // 새 룰렛 실행 시 팀장 자동 초기화
    captainsState = {};

    spinBtn.disabled = true;
    rerollBtn.disabled = true;
    startShuffleAnimation(1200, () => {
      renderResult(result);
      spinBtn.disabled = false;
      rerollBtn.disabled = false;
      setTimeout(() => {
        document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    });
  }
  spinBtn.addEventListener('click', runRoulette);
  rerollBtn.addEventListener('click', runRoulette);

  // ===== 컨페티 =====
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let confettiRunning = false;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function launchConfetti() {
    particles = [];
    const colors = ['#F4A89A', '#FBD7CF', '#5FB8A8', '#C8E8E0', '#7DA3D9', '#CFDDF0', '#E88A78'];
    const types = ['circle', 'square', 'rect'];
    const count = 100;
    for (let i = 0; i < count; i++) {
      particles.push({
        x: canvas.width / 2 + (Math.random() - 0.5) * 240,
        y: canvas.height / 2 + (Math.random() - 0.5) * 100,
        vx: (Math.random() - 0.5) * 14,
        vy: -Math.random() * 14 - 6,
        gravity: 0.32 + Math.random() * 0.1,
        rotation: Math.random() * Math.PI * 2,
        vRotation: (Math.random() - 0.5) * 0.3,
        type: types[Math.floor(Math.random() * types.length)],
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 6 + Math.random() * 8,
        life: 1.0,
        opacity: 1
      });
    }
    if (!confettiRunning) {
      confettiRunning = true;
      requestAnimationFrame(updateConfetti);
    }
  }

  function drawParticle(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle = p.color;
    if (p.type === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, p.size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'square') {
      ctx.fillRect(-p.size*0.5, -p.size*0.5, p.size, p.size);
    } else {
      ctx.fillRect(-p.size*0.8, -p.size*0.25, p.size*1.6, p.size*0.5);
    }
    ctx.restore();
  }

  function updateConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.vy += p.gravity;
      p.x += p.vx;
      p.y += p.vy;
      p.rotation += p.vRotation;
      p.life -= 0.005;
      p.opacity = Math.max(0, Math.min(1, p.life * 1.5));
      drawParticle(p);
    });
    particles = particles.filter(p => p.life > 0 && p.y < canvas.height + 50);
    if (particles.length > 0) {
      requestAnimationFrame(updateConfetti);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiRunning = false;
    }
  }
</script>

</body>
